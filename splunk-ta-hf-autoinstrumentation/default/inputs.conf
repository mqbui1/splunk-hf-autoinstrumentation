# Splunk HF Auto-Instrumentation — default input stanza.
# Copy to local/inputs.conf and set disabled = false to enable.
#
# interval = -1  means the script runs as a persistent process (daemon mode).
# Splunk will restart it automatically if it exits unexpectedly.

[hf_autoinstrumentation://default]
interval          = -1
disabled          = true
otlp_endpoint     = http://localhost:4318
deployment_environment = production
poll_interval     = 30
agent_version     = 2.14.0
jattach_path      = jattach
exclude_patterns  =
skip_root_processes = true
agent_cache_dir   = /tmp/splunk-autoinstrumentation
